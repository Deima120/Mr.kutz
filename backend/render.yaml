services:
  - type: web
    name: mrkutz-backend
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npx prisma generate
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: DATABASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: PUBLIC_FRONTEND_URL
        sync: false
      - key: CORS_ALLOW_PREVIEWS
        value: "false"
      # Correo: Render free bloquea SMTP — usar Brevo API HTTP (ver backend/.env.example)
      - key: MAIL_PROVIDER
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_FROM_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        sync: false
      # Cron estados de citas (Render Cron Job + opcional ping HTTP)
      - key: CRON_SECRET
        sync: false
      - key: APPOINTMENT_STATUS_CRON_MS
        value: "60000"

  - type: cron
    name: mrkutz-appointment-status
    runtime: node
    plan: free
    schedule: "*/5 * * * *"
    rootDir: .
    buildCommand: npm install && npx prisma generate
    startCommand: npm run cron:appointment-status
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
